name: Scheduled Data Ingestion

on:
  schedule:
    # 10:30 AM IST is 5:00 AM UTC
    - cron: '0 5 * * *'
  workflow_dispatch: # Allows manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  ingest_data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Required to push commits back to the repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # or whatever version is required
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: playwright install chromium

      - name: Run Ingestion Script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python src/ingestion/ingest.py

      - name: Commit and push updated database
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -f chroma_db/
          git commit -m "Automated daily ingestion of mutual fund data" || echo "No changes to commit"
          git push
